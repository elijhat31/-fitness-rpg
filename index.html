<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness RPG</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Fitness RPG</p>
        <h1>Weekly Workout</h1>
        <p>Complete exercises to earn XP. Finish a full day to claim bonus XP and coins.</p>
        <div class="stats" aria-label="Player stats">
          <span id="xp-total">0 XP</span>
          <span id="coin-total">0 Coins</span>
        </div>
      </header>

      <section id="workout-grid" class="workout-grid" aria-label="Weekly workout cards"></section>
    </main>

    <script src="src/main.js"></script>
  </body>
</html>
